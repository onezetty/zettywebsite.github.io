<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneZetty | Links</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #ffffff;
            --accent-color: #2f81f7;
            --button-bg: #21262d;
            --button-hover: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--accent-color);
        }

        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background-color: var(--button-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .link-card:hover {
            background-color: var(--button-hover);
            border-color: #8b949e;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <img src="https://github.com/OneZetty.png" alt="OneZetty" class="profile-img">
    
    <h1>@OneZetty</h1>

    <div class="links-container">
        <a href="https://www.binance.com/referral/earn-together/refer2earn-usdc/claim?hl=es&ref=GRO_28502_6BSQC&utm_source=default" class="link-card" target="_blank">Abre una cuenta en Binance</a>
        <a href="https://dl.edge.app/onezetty" class="link-card" target="_blank">Descarga Edge Wallet</a>
        <a href="https://x.com/OneZetty" class="link-card" target="_blank">𝕏 (Twitter)</a>
        <a href="https://www.instagram.com/onezetty/" class="link-card" target="_blank">Instagram</a>
        <a href="mailto:onezetty@proton.me" class="link-card" target="_blank">Email</a>
        <a href="https://github.com/OneZetty" class="link-card" target="_blank">GitHub Projects</a>
        </div>

    <footer>
        Hecho con ✨ en GitHub Pages
    </footer>

</body>
</html>
