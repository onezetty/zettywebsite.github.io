<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to Excel Converter</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Convertidor JSON a Excel</h1>
        <p>Selecciona un archivo .json para generar el reporte.</p>
        <input type="file" id="upload" accept=".json" />
        <br>
        <button id="download" style="display:none;">Descargar Excel</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
